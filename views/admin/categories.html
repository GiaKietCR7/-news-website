<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categories - The Daily Press Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-100 min-h-screen">
    <nav class="bg-slate-900 text-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <h1 class="text-lg font-bold">The Daily Press</h1>
                <span class="text-xs bg-slate-700 px-2 py-1 rounded">Admin</span>
            </div>
            <div class="flex items-center gap-4">
                <a href="/secret-admin-panel" class="text-sm text-slate-300 hover:text-white transition">Dashboard</a>
                <a href="/secret-admin-panel/settings" class="text-sm text-slate-300 hover:text-white transition">Settings</a>
                <a href="/" target="_blank" class="text-sm text-slate-300 hover:text-white transition">View Site</a>
                <button onclick="logout()" class="text-sm bg-red-600 hover:bg-red-700 px-3 py-1.5 rounded-lg transition">Logout</button>
            </div>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto px-4 py-8">
        <div class="flex items-center gap-3 mb-8">
            <a href="/secret-admin-panel" class="text-gray-400 hover:text-gray-600 transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
            </a>
            <h2 class="text-2xl font-bold text-gray-900">Categories</h2>
        </div>

        <!-- Add Category -->
        <div class="bg-white rounded-xl shadow-sm p-6 mb-6">
            <h3 class="font-bold text-gray-900 mb-4">Add New Category</h3>
            <div class="flex gap-3">
                <input type="text" id="new-cat-name" placeholder="Category name" class="flex-1 px-4 py-2.5 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-slate-800 transition">
                <input type="color" id="new-cat-color" value="#6b7280" class="w-12 h-10 rounded-lg border border-gray-300 cursor-pointer">
                <button onclick="addCategory()" class="px-5 py-2.5 bg-slate-900 hover:bg-slate-800 text-white rounded-xl font-medium transition">Add</button>
            </div>
            <div id="cat-message" class="hidden mt-3 px-4 py-2 rounded-xl text-sm"></div>
        </div>

        <!-- Filter -->
        <div class="flex items-center gap-4 mb-6">
            <input type="text" id="filter-search" placeholder="Search categories..." class="flex-1 max-w-xs px-4 py-2 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-slate-800 transition text-sm">
            <select id="filter-sort" class="px-4 py-2 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-slate-800" onchange="loadCategories()">
                <option value="name">Sort by Name</option>
                <option value="count">Sort by Article Count</option>
            </select>
        </div>

        <!-- Categories Grid -->
        <div id="categories-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
        </div>

        <!-- Category Detail Modal -->
        <div id="detail-modal" class="fixed inset-0 bg-black/50 z-50 hidden flex items-start justify-center overflow-y-auto p-4">
            <div class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl my-8">
                <div class="flex items-center justify-between px-6 py-4 border-b border-gray-200">
                    <h3 id="detail-title" class="text-lg font-bold text-gray-900"></h3>
                    <button onclick="closeDetail()" class="text-gray-400 hover:text-gray-600">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                    </button>
                </div>
                <div class="p-6">
                    <!-- Date filter -->
                    <div class="flex items-center gap-3 mb-4">
                        <input type="date" id="filter-from" class="px-3 py-2 border border-gray-300 rounded-lg text-sm">
                        <span class="text-gray-400">to</span>
                        <input type="date" id="filter-to" class="px-3 py-2 border border-gray-300 rounded-lg text-sm">
                        <button onclick="filterArticles()" class="px-4 py-2 bg-gray-100 hover:bg-gray-200 rounded-lg text-sm font-medium transition">Filter</button>
                    </div>
                    <!-- Articles list -->
                    <div id="detail-articles" class="space-y-3 max-h-96 overflow-y-auto"></div>
                    <div id="detail-empty" class="hidden text-center py-8 text-gray-400">No articles in this category</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let allCategories = [];
        let currentDetailCategory = '';

        async function loadCategories() {
            try {
                const res = await fetch('/api/categories');
                allCategories = await res.json();

                const search = document.getElementById('filter-search').value.toLowerCase();
                const sort = document.getElementById('filter-sort').value;

                let filtered = allCategories.filter(c => c.name.toLowerCase().includes(search));
                if (sort === 'count') filtered.sort((a, b) => b.article_count - a.article_count);
                else filtered.sort((a, b) => a.name.localeCompare(b.name));

                const grid = document.getElementById('categories-grid');
                grid.innerHTML = filtered.map(cat => `
                    <div class="bg-white rounded-xl shadow-sm p-5 border-l-4 hover:shadow-md transition" style="border-left-color: ${cat.color}">
                        <div class="flex items-center justify-between mb-3">
                            <div class="flex items-center gap-3">
                                <div class="w-4 h-4 rounded-full" style="background: ${cat.color}"></div>
                                <h4 class="font-bold text-gray-900">${escapeHtml(cat.name)}</h4>
                            </div>
                            <span class="text-xs bg-gray-100 text-gray-600 px-2.5 py-1 rounded-full font-medium">${cat.article_count} articles</span>
                        </div>
                        <div class="flex items-center gap-2 mt-3">
                            <button onclick="viewCategory('${escapeHtml(cat.name)}')" class="text-xs px-3 py-1.5 bg-blue-50 text-blue-700 hover:bg-blue-100 rounded-lg transition font-medium">View Posts</button>
                            <button onclick="editCategory(${cat.id}, '${escapeHtml(cat.name)}', '${cat.color}')" class="text-xs px-3 py-1.5 bg-gray-50 text-gray-700 hover:bg-gray-100 rounded-lg transition font-medium">Edit</button>
                            <button onclick="deleteCategory(${cat.id}, '${escapeHtml(cat.name)}')" class="text-xs px-3 py-1.5 bg-red-50 text-red-700 hover:bg-red-100 rounded-lg transition font-medium">Delete</button>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                console.error('Failed to load categories:', err);
            }
        }

        async function addCategory() {
            const name = document.getElementById('new-cat-name').value.trim();
            const color = document.getElementById('new-cat-color').value;
            if (!name) { showMsg('Please enter a category name.', 'error'); return; }

            const res = await fetch('/api/admin/categories', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, color })
            });
            const data = await res.json();
            if (res.ok) {
                document.getElementById('new-cat-name').value = '';
                showMsg('Category created!', 'success');
                loadCategories();
            } else {
                showMsg(data.error || 'Failed to create category.', 'error');
            }
        }

        function editCategory(id, name, color) {
            const newName = prompt('Edit category name:', name);
            if (!newName || newName === name) return;
            fetch('/api/admin/categories/' + id, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: newName, color })
            }).then(() => loadCategories());
        }

        async function deleteCategory(id, name) {
            if (!confirm(`Delete "${name}"? Articles will be moved to General.`)) return;
            await fetch('/api/admin/categories/' + id, { method: 'DELETE' });
            loadCategories();
        }

        async function viewCategory(name) {
            currentDetailCategory = name;
            document.getElementById('detail-title').textContent = name + ' - Articles';
            document.getElementById('detail-modal').classList.remove('hidden');
            document.getElementById('filter-from').value = '';
            document.getElementById('filter-to').value = '';
            filterArticles();
        }

        async function filterArticles() {
            const from = document.getElementById('filter-from').value;
            const to = document.getElementById('filter-to').value;

            const res = await fetch('/api/articles?category=' + encodeURIComponent(currentDetailCategory));
            let articles = await res.json();

            if (from) articles = articles.filter(a => a.created_at >= from);
            if (to) articles = articles.filter(a => a.created_at <= to + 'T23:59:59');

            const container = document.getElementById('detail-articles');
            const empty = document.getElementById('detail-empty');

            if (articles.length === 0) {
                container.innerHTML = '';
                empty.classList.remove('hidden');
                return;
            }
            empty.classList.add('hidden');
            container.innerHTML = articles.map(a => `
                <div class="flex items-center justify-between p-3 bg-gray-50 rounded-xl">
                    <div class="flex items-center gap-3 flex-1 min-w-0">
                        ${a.image ? `<img src="${a.image}" class="w-10 h-10 rounded-lg object-cover flex-shrink-0">` : `<div class="w-10 h-10 rounded-lg bg-gray-200 flex-shrink-0"></div>`}
                        <div class="min-w-0">
                            <p class="text-sm font-medium text-gray-900 truncate">${escapeHtml(a.title)}</p>
                            <p class="text-xs text-gray-500">${a.author} • ${formatDate(a.created_at)}</p>
                        </div>
                    </div>
                    <a href="/news/${a.slug || a.id}" target="_blank" class="text-xs text-blue-600 hover:text-blue-800 ml-2 flex-shrink-0">View →</a>
                </div>
            `).join('');
        }

        function closeDetail() { document.getElementById('detail-modal').classList.add('hidden'); }

        function showMsg(text, type) {
            const el = document.getElementById('cat-message');
            el.textContent = text;
            el.className = `mt-3 px-4 py-2 rounded-xl text-sm ${type === 'error' ? 'bg-red-50 text-red-700' : 'bg-green-50 text-green-700'}`;
            el.classList.remove('hidden');
            setTimeout(() => el.classList.add('hidden'), 3000);
        }

        function formatDate(d) { return new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }); }
        function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t || ''; return d.innerHTML; }
        async function logout() { await fetch('/api/admin/logout', { method: 'POST' }); window.location.href = '/secret-admin-panel/login'; }

        document.getElementById('filter-search').addEventListener('input', loadCategories);
        loadCategories();
    </script>
</body>
</html>
